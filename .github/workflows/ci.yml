name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        working-directory: backend
        env:
          APP_PASSWORD_HASH: ${{ secrets.APP_PASSWORD_HASH || '$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lEo6' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dev_secret_replace_in_prod_min_32_chars_padding' }}
        run: ./mvnw -B verify

  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @redocly/cli@latest
      - run: redocly lint api/openapi.yaml
